project_id = "gycfenujnucwqgqbyfli"

[auth]
site_url = "https://pick-my-flick-now.vercel.app"
additional_redirect_urls = [
  "https://pick-my-flick-now.vercel.app/",
  "https://pick-my-flick-now.vercel.app/*",
  "http://localhost:3000/*",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage.vector]
enabled = false
